<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urvi Montessori Chat</title>

  <!-- Google Font: DM Sans, used across the whole widget (see body font-family in style.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <!--
    MARKDOWN RENDERING (bot replies only — see script.js section 6):
      marked     — converts Markdown text ("**bold**", "- bullets") into HTML
      DOMPurify  — sanitizes that HTML before it's inserted into the page,
                   stripping anything unsafe (scripts, event handlers, etc.)
    User messages never go through these — they always use textContent.
  -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>
<body>

  <!--
    ══════════════════════════════════════════════════════
    GREETING BUBBLES
    Two small speech-bubble tooltips that float up near
    the chat button a couple of seconds after the page loads.
    JavaScript shows them and handles clicks on them.
      • Clicking the text  → opens chat + sends that text
      • Clicking ✕         → dismisses just that bubble
    ══════════════════════════════════════════════════════
  -->
  <div id="greeting-bubbles" class="greeting-bubbles" aria-hidden="true">

    <!-- Second greeting (shown 0.7 s after the first, sits on top) -->
    <div class="greeting-bubble" id="greeting-2">
      <button class="greeting-close" aria-label="Dismiss">✕</button>
      <span class="greeting-text">Ask Urvija ✨</span>
    </div>

    <!-- First greeting (shown first, sits closest to the chat button) -->
    <div class="greeting-bubble" id="greeting-1">
      <button class="greeting-close" aria-label="Dismiss">✕</button>
      <span class="greeting-text">Got a question? 🌱</span>
    </div>

  </div><!-- end #greeting-bubbles -->


  <!--
    ══════════════════════════════════════════════════════
    FLOATING CHAT BUBBLE BUTTON  — "protective orb" design
    Always visible in the bottom-right corner.
    The emblem sits inside a frosted-glass sphere that
    floats up and down with a soft energy halo behind it.
    When the chat opens the emblem hides and a plain ✕ shows.
    Clicking toggles the chat window open/closed.
    ══════════════════════════════════════════════════════
  -->
  <button id="chat-bubble" aria-label="Open chat">

    <!-- Emblem (earth-globe cutout, transparent PNG) sits inside the glass orb -->
    <img src="urvi-emblem.png" alt="Urvi Montessori" id="bubble-logo" />

    <!-- X icon — hidden normally, shown when the chat is open -->
    <svg id="bubble-icon-close"
         xmlns="http://www.w3.org/2000/svg"
         width="26" height="26" viewBox="0 0 24 24"
         fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
      <line x1="18" y1="6"  x2="6"  y2="18" />
      <line x1="6"  y1="6"  x2="18" y2="18" />
    </svg>

  </button><!-- end #chat-bubble -->


  <!--
    ══════════════════════════════════════════════════════
    CHAT WINDOW
    Hidden when the page loads. JavaScript removes the
    'hidden' class to reveal it with a bounce animation.

    Layout (top → bottom):
      .chat-header     — logo, name, close button
      .chat-messages   — scrollable conversation area
      .chat-input-area — text field + send arrow
      .chat-footer     — "Powered by Urvi Montessori"
    ══════════════════════════════════════════════════════
  -->
  <div id="chat-window" class="chat-window hidden">

    <!-- ── HEADER ─────────────────────────────────── -->
    <div class="chat-header">
      <div class="chat-header-info">
        <!--
          Emblem shown in the header for branding.
          Wrapped in .header-logo-wrap so a pulsing glow (::before in
          style.css) can sit behind it without affecting layout.
        -->
        <div class="header-logo-wrap">
          <img src="urvi-emblem.png" alt="Urvi Montessori logo" class="header-logo" />
        </div>
        <div>
          <div class="chat-title">Urvija</div>
          <div class="chat-subtitle">
            <!-- Green dot = "online" -->
            <span class="status-dot" aria-hidden="true"></span>
            I'm here to help.
          </div>
        </div>
      </div>
      <!--
        HEADER ACTION BUTTONS (right side of the header)
        Three small icon buttons: mute/unmute reply sounds, start a new
        chat, and close. Grouped in one container so they line up neatly.
      -->
      <div class="header-actions">

        <!--
          SOUND TOGGLE
          Turns the little "new reply" chime + vibration on or off.
          OFF by default. aria-pressed tells screen readers the on/off state.
          Two icons live inside: a normal bell (shown when ON) and a
          bell-with-a-slash (shown when OFF). CSS swaps which one is visible
          based on the .is-on class that script.js toggles.
        -->
        <button id="sound-btn" class="header-icon-btn" type="button"
                aria-label="Turn reply sounds on" aria-pressed="false"
                title="Reply sounds">
          <!-- Bell ON (visible only when sounds are enabled) -->
          <svg class="icon-bell-on" xmlns="http://www.w3.org/2000/svg"
               width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <!-- Bell OFF / muted (visible by default) -->
          <svg class="icon-bell-off" xmlns="http://www.w3.org/2000/svg"
               width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            <path d="M18.63 13A17.89 17.89 0 0 1 18 8"/>
            <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/>
            <path d="M18 8a6 6 0 0 0-9.33-5"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>

        <!--
          NEW CHAT / START OVER
          Clears the saved conversation and shows a fresh welcome message.
          script.js asks for confirmation first so a parent can't wipe the
          chat by accident.
        -->
        <button id="new-chat-btn" class="header-icon-btn" type="button"
                aria-label="Start a new chat" title="Start over">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>

        <!-- X button inside the header — another way to close the chat -->
        <button id="close-btn" class="close-btn" aria-label="Close chat">&times;</button>
      </div>
    </div>

    <!-- ── MESSAGES ────────────────────────────────── -->
    <!--
      .chat-messages-viewport holds the emblem watermark and never
      scrolls itself — only #chat-messages inside it scrolls. That way
      the watermark stays put on screen no matter how far you scroll
      up/down through the conversation (see style.css section 8).

      All chat bubbles are created and appended into #chat-messages by
      script.js. role="log" + aria-live="polite" tells screen readers
      to announce new messages as they appear.
    -->
    <div class="chat-messages-viewport">
      <div id="chat-messages" class="chat-messages" role="log" aria-live="polite">
        <!-- Populated dynamically by script.js -->
      </div>
    </div>

    <!-- ── IMAGE PREVIEW BAR ──────────────────────────
         Appears above the input when a parent selects an image.
         Hidden by default (max-height: 0 in CSS).
         script.js adds the "visible" class to slide it open.
    ─────────────────────────────────────────────────── -->
    <div id="image-preview-bar" class="image-preview-bar">
      <img id="image-preview-thumb" class="image-preview-thumb"
           alt="Preview of selected image" />
      <!-- ✕ clears the image selection without sending -->
      <button id="image-remove-btn" class="image-remove-btn"
              type="button" aria-label="Remove selected image">✕</button>
    </div>

    <!-- ── INPUT BAR ───────────────────────────────── -->
    <div class="chat-input-area">

      <!-- Hidden file picker — the paperclip button below opens it -->
      <input type="file" id="image-input" accept="image/*"
             style="display:none" aria-label="Choose an image to attach" />

      <!--
        PAPERCLIP / IMAGE ATTACH BUTTON
        Clicking it triggers the hidden file input above.
        TODO (backend): The image is currently shown only in the chat UI
        (as a local preview). To send it to Claude Vision you need to:
          1. Read the file as base64 in script.js (already done via FileReader)
          2. Include it in the fetch body:
               body: JSON.stringify({ message: text, image: base64DataUrl })
          3. In index.js, pass the image to the Claude API using the
             "image" content block:
               { type: "image", source: { type: "base64",
                 media_type: "image/jpeg", data: "..." } }
      -->
      <button id="image-btn" class="image-btn" type="button"
              aria-label="Attach an image">
        <!-- Paperclip icon (Feather-icons style SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>

      <input
        type="text"
        id="user-input"
        placeholder="Type your message…"
        autocomplete="off"
        aria-label="Type your message"
      />
      <!-- Paper-plane send button -->
      <button id="send-btn" aria-label="Send message">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

    <!-- ── FOOTER ──────────────────────────────────── -->
    <!--
      Two rows:
        1. "Talk to a Montessori Mentor" button
        2. "Powered by Urvi Montessori" brand line
    -->
    <div class="chat-footer">

      <!--
        TALK TO MENTOR BUTTON
        Clicking shows a warm reassurance message in the chat.
        TODO (backend): Send a POST /mentor-request to your backend so
        staff can see which parent clicked this and what they were asking.
        Include the `conversation` array in the request body so the teacher
        has full context before reaching out.
      -->
      <button id="mentor-btn" class="mentor-btn" type="button">
        <!-- Person / teacher icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Talk to a Montessori Mentor
      </button>

      <!--
        PRIVACY REASSURANCE
        A tiny trust line so parents feel safe sharing details. The lock
        emoji is marked aria-hidden so screen readers don't read "lock".
      -->
      <div class="privacy-note">
        <span aria-hidden="true">🔒</span>
        We only use your info to respond to your enquiry.
      </div>

      <div class="footer-brand">Powered by Urvi Montessori</div>
    </div>

  </div><!-- end #chat-window -->


  <!-- Script is at the bottom so all HTML elements exist before JS runs -->
  <script src="script.js"></script>
</body>
</html>
